# NeMo Guardrails config: check-only self-check rails (see rag/guardrails.py).
# The checker LLM runs on the cheap flash model via OpenRouter — same seam as
# generation (rag/clients.py), different knob: guard checks, not answers.
models:
  - type: main
    engine: openai
    model: deepseek/deepseek-v4-flash
    api_key_env_var: OPENROUTER_API_KEY
    parameters:
      base_url: https://openrouter.ai/api/v1

rails:
  input:
    flows:
      - self check input
  output:
    flows:
      - self check output
