# Base hyperparameters for the RAG system. Loaded once by rag/config.py.
# Eval experiment configs (evals/configs/*.json) override some of these per run;
# this file is the production default. EMBED_DIM and BATCH_SIZE stay in code:
# EMBED_DIM must match VECTOR(1024) in db/migrations/, BATCH_SIZE is a Voyage throughput detail.

[chunking]
chunk_size = 256      # won the size sweep (evals/chunking-experiments.md)
chunk_overlap = 50    # tokens carried from the end of one chunk into the next

[embedding]
voyage_model = "voyage-4"

[retrieval]
method = "rerank"           # retriever funnel: vector | hybrid | rerank (the full stack)
query_enhancement = ""      # "" (off) | "hyde" | "multi_query" — runtime query rewriting
parent_document = false     # widen each hit to its neighbouring chunks before answering
hype = false                # match the query against index-time hypothetical questions (HyPE)
top_k = 25                  # chunks handed to the generator — the main "how much context" lever
relevance_threshold = 0.7   # cosine distance above which the corpus is treated as "no answer"
fuse_depth = 120            # candidates pulled per retriever before RRF
rrf_k = 60                  # Reciprocal Rank Fusion constant (paper value)
vector_weight = 1.0
keyword_weight = 0.5        # keyword is the noisier retriever, so it's down-weighted
rerank_model = "rerank-2.5"
rerank_depth = 120           # fused candidates fed to the cross-encoder reranker
source_window = 3           # context chunks shown each side of a cited chunk on click-through

[generation]
gen_provider = "openai-compat"            # prod runs DeepSeek via OpenRouter
gen_model = "deepseek/deepseek-v4-pro"    # default (the "pro" picker option)
gen_models = { pro = "deepseek/deepseek-v4-pro", flash = "deepseek/deepseek-v4-flash" }  # selectable via the /ask `model` field
answer_format = "prose"                   # "prose" (synthesized answer) or "claims" (structured, per-sentence citations)
max_tokens = 4096
structured_max_tokens = 4096              # the JSON-claims path runs longer than raw prose

[ocr]
ocr_model = "deepseek/deepseek-v4-pro"    # multimodal; transcribes slide images via OpenRouter

[agent]
# The Deep Agent path (/ask/agent). Runs on the cheap flash model via OpenRouter,
# same seam as generation. Never pro — flash covers the tool-calling this needs.
agent_model = "deepseek/deepseek-v4-flash"
research_subagent_model = "deepseek/deepseek-v4-flash"
agent_top_k = 25            # chunks the retrieve_corpus tool hands the agent
agent_method = "rerank"     # retriever funnel the tool uses (vector | hybrid | rerank)
