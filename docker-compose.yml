services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - rag-pgdata:/var/lib/postgresql/data
      # Schema is applied by `uv run python db/migrate.py` after startup (not on
      # first-init), so schema changes reach an existing volume, not just a fresh one.

volumes:
  rag-pgdata:
